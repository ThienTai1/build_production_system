services:
  etcd:
    networks:
      - monitoring
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    command: etcd --advertise-client-urls http://127.0.0.1:2379 --listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    networks:
      - monitoring
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: server /export --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.5.4
    networks:
      - monitoring
    # Cực kỳ quan trọng cho Mac Silicon:
    platform: linux/amd64
    container_name: milvus_standalone
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      minio:
        condition: service_healthy
      etcd:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    networks:
      - monitoring
    container_name: prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:latest
    networks:
      - monitoring
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./deploy/loki/local-config.yaml:/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.6.1
    networks:
      - monitoring
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/tempo/tempo.yml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    networks:
      - monitoring
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/otel-collector/config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "1888:1888" # pprof extension
      - "8888:8888" # Prometheus metrics exposed by the collector
      - "8889:8889" # Prometheus exporter metrics
      - "13133:13133" # health_check extension
      - "55679:55679" # zpages extension
      - "4317:4317" # otlp grpc
      - "4318:4318" # otlp http
    depends_on:
      - loki
      - tempo

  grafana:
    image: grafana/grafana:latest
    networks:
      - monitoring
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor,traceqlSearch,correlatedMetrics
    depends_on:
      - prometheus
      - loki
      - tempo

  # Note: Langfuse, Langfuse-DB, and Langfuse-Clickhouse have been moved to a standalone setup in deploy/langfuse_official

networks:
  monitoring:
    driver: bridge

volumes:
  tempo-data:
